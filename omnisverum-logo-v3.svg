<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    <linearGradient id="bookCover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="bookSpine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#111111;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#aaaaaa;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle noise particles -->
  <circle cx="55" cy="55" r="0.6" fill="#333" fill-opacity="0.5"/>
  <circle cx="345" cy="70" r="0.5" fill="#333" fill-opacity="0.4"/>
  <circle cx="70" cy="330" r="0.6" fill="#333" fill-opacity="0.3"/>
  <circle cx="355" cy="310" r="0.5" fill="#333" fill-opacity="0.4"/>

  <!-- Book shadow -->
  <ellipse cx="202" cy="255" rx="90" ry="7" fill="#000000" fill-opacity="0.9"/>

  <!-- Book pages stack -->
  <rect x="200" y="82" width="108" height="162" rx="2" fill="#141414" stroke="#222" stroke-width="0.5"/>
  <rect x="198" y="80" width="108" height="162" rx="2" fill="#111" stroke="#1e1e1e" stroke-width="0.5"/>
  <rect x="196" y="78" width="108" height="162" rx="2" fill="#0e0e0e" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Main book cover -->
  <rect x="96" y="75" width="142" height="168" rx="3" fill="url(#bookCover)" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Book spine -->
  <rect x="93" y="75" width="18" height="168" rx="2" fill="url(#bookSpine)" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="104" y1="82" x2="104" y2="236" stroke="#2a2a2a" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- Book cover border -->
  <rect x="106" y="83" width="124" height="152" rx="1" fill="none" stroke="#222" stroke-width="0.8"/>
  <rect x="110" y="87" width="116" height="144" rx="1" fill="none" stroke="#2a2a2a" stroke-width="0.4" stroke-opacity="0.6"/>

  <!-- Eye glow backdrop -->
  <circle cx="168" cy="158" r="40" fill="url(#eyeGlow)"/>

  <!-- Eye outer ring -->
  <circle cx="168" cy="158" r="34" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="168" cy="158" r="30" fill="none" stroke="#333" stroke-width="0.5" stroke-opacity="0.6"/>

  <!-- Almond eye shape -->
  <path d="M132,158 Q150,136 168,133 Q186,136 204,158 Q186,180 168,183 Q150,180 132,158 Z" fill="#080808" stroke="#444" stroke-width="0.8" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="168" cy="158" r="17" fill="#111" stroke="#555" stroke-width="0.8"/>

  <!-- Pupil -->
  <circle cx="168" cy="158" r="9" fill="#000"/>
  <circle cx="168" cy="158" r="6" fill="#1a1a1a" filter="url(#glow)"/>

  <!-- Eye white highlight -->
  <circle cx="163" cy="153" r="3" fill="white" fill-opacity="0.85" filter="url(#glow)"/>
  <circle cx="173" cy="163" r="1.2" fill="white" fill-opacity="0.3"/>

  <!-- Eye rays -->
  <line x1="168" y1="124" x2="168" y2="117" stroke="#333" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="168" y1="192" x2="168" y2="199" stroke="#333" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="132" y1="158" x2="125" y2="158" stroke="#333" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="204" y1="158" x2="211" y2="158" stroke="#333" stroke-width="0.7" stroke-opacity="0.7"/>
  <line x1="144" y1="133" x2="139" y2="128" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="192" y1="133" x2="197" y2="128" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="144" y1="183" x2="139" y2="188" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="192" y1="183" x2="197" y2="188" stroke="#333" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Book text lines -->
  <line x1="114" y1="210" x2="222" y2="210" stroke="#222" stroke-width="0.7" stroke-opacity="0.8"/>
  <line x1="114" y1="218" x2="210" y2="218" stroke="#1e1e1e" stroke-width="0.7" stroke-opacity="0.6"/>
  <line x1="114" y1="226" x2="216" y2="226" stroke="#1e1e1e" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- Corner ornaments -->
  <path d="M111,88 L111,96 M111,88 L119,88" fill="none" stroke="#333" stroke-width="0.8"/>
  <path d="M227,88 L227,96 M227,88 L219,88" fill="none" stroke="#333" stroke-width="0.8"/>
  <path d="M111,234 L111,226 M111,234 L119,234" fill="none" stroke="#333" stroke-width="0.8"/>
  <path d="M227,234 L227,226 M227,234 L219,234" fill="none" stroke="#333" stroke-width="0.8"/>

  <!-- WORDMARK: O and V large, rest small -->
  <!-- Full word centered, O and V oversized -->

  <!-- "O" large -->
  <text x="108" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#ffffff"
    filter="url(#glow)">O</text>

  <!-- "mnis" small -->
  <text x="134" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2"
    fill="#555555">mnis</text>

  <!-- "V" large -->
  <text x="174" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="38"
    font-weight="700"
    fill="#ffffff"
    filter="url(#glow)">V</text>

  <!-- "erum" small -->
  <text x="198" y="308"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2"
    fill="#555555">erum</text>

  <!-- Thin divider line -->
  <line x1="100" y1="317" x2="300" y2="317" stroke="#222" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="200" y="332"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="7.5"
    letter-spacing="2.5"
    text-anchor="middle"
    fill="#333333">UPLOAD TRUTH. ASK ANYTHING.</text>

</svg>
